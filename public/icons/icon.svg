<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#36ADF6"/>
      <stop offset="100%" style="stop-color:#0074C5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,240)" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- House shape -->
    <path d="M-100,20 L0,-80 L100,20" />
    <path d="M-80,10 L-80,100 L80,100 L80,10" />
    <rect x="-25" y="45" width="50" height="55" rx="4" />
  </g>
  <g transform="translate(256,330)" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.7">
    <!-- Wrench -->
    <circle cx="60" cy="-30" r="15" />
    <line x1="50" y1="-20" x2="20" y2="10" />
  </g>
</svg>
